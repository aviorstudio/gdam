name: 'Setup gdam'
description: 'Install the gdam CLI (Godot addon manager)'

inputs:
  gdam-version:
    description: 'gdam version for go install (e.g., latest, main, or a commit SHA)'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Install gdam
      shell: bash
      run: |
        set -euo pipefail

        mkdir -p "$HOME/.local/bin"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

        GOBIN="$HOME/.local/bin" go install "github.com/aviorstudio/gdam/cli/cmd/gdam@${{ inputs.gdam-version }}"

        gdam --help > /dev/null
