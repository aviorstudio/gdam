name: CLI Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'CLI version to release, e.g. 0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Validate release input
        id: release
        env:
          VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$REF_NAME" != "main" ]; then
            echo 'Run this workflow from main.' >&2
            exit 1
          fi
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo 'Version must look like 0.1.0 or 0.1.0-rc.1.' >&2
            exit 1
          fi
          TAG="cli/v$VERSION"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag already exists locally: $TAG" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag already exists on origin: $TAG" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Test CLI
        working-directory: cli
        run: go test ./...

      - name: Verify release key
        env:
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$SUPABASE_PUBLISHABLE_KEY" ]; then
            echo 'Missing required secret: SUPABASE_PUBLISHABLE_KEY' >&2
            exit 1
          fi

      - name: Build release artifacts
        env:
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          VERSION: ${{ steps.release.outputs.version }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist

          build() {
            goos="$1"
            goarch="$2"
            os_label="$3"
            arch_label="$4"
            archive_ext="$5"
            exe=""
            if [ "$goos" = "windows" ]; then
              exe=".exe"
            fi

            name="gdam_${os_label}_${arch_label}"
            out_dir="dist/$name"
            mkdir -p "$out_dir"
            out_path="$PWD/$out_dir/gdam$exe"
            (cd cli && GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build \
              -ldflags "-s -w -X main.version=$VERSION -X main.commit=$COMMIT -X main.date=$DATE -X github.com/aviorstudio/gdam/cli/internal/gdamdb.DefaultSupabasePublishableKey=$SUPABASE_PUBLISHABLE_KEY" \
              -o "$out_path" ./cmd/gdam)
            cp cli/README.md "$out_dir/README.md"

            if [ "$archive_ext" = "zip" ]; then
              (cd "$out_dir" && zip -q "../$name.zip" "gdam$exe" README.md)
            else
              tar -C "$out_dir" -czf "dist/$name.tar.gz" "gdam$exe" README.md
            fi
          }

          build linux amd64 Linux x86_64 tar.gz
          build linux arm64 Linux arm64 tar.gz
          build darwin amd64 Darwin x86_64 tar.gz
          build darwin arm64 Darwin arm64 tar.gz
          build windows amd64 Windows x86_64 zip
          build windows arm64 Windows arm64 zip

          (cd dist && sha256sum *.tar.gz *.zip > checksums.txt)

      - name: Create and push tag
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$TAG" dist/*.tar.gz dist/*.zip dist/checksums.txt \
            --title "CLI v$VERSION" \
            --generate-notes
