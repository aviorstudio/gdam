name: Create CLI Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'CLI version to release, e.g. 0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Validate version and branch
        id: release
        env:
          VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$REF_NAME" != "main" ]; then
            echo 'Run this workflow from main.' >&2
            exit 1
          fi
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo 'Version must look like 0.1.0 or 0.1.0-rc.1.' >&2
            exit 1
          fi
          TAG="cli/v$VERSION"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag already exists: $TAG" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Test CLI
        working-directory: cli
        run: go test ./...

      - name: Build CLI
        run: ./scripts/cli_build.sh

      - name: Create and push tag
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
